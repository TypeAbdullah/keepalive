<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Service Link Saver</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0b0f19;
      color: #f1f5f9;
      padding: 40px 15px;
      max-width: 650px;
      margin: 0 auto;
    }
    h1 { color: #ffffff; font-size: 26px; margin-bottom: 6px; }
    p { color: #64748b; font-size: 14px; margin-top: 0; margin-bottom: 24px; }
    .card {
      background-color: #111827;
      border: 1px solid #1f2937;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }
    label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 13px; color: #9ca3af; }
    input, select {
      width: 100%;
      padding: 11px 14px;
      background-color: #030712;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    input:focus, select:focus { border-color: #3b82f6; outline: none; }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    button:hover { background-color: #1d4ed8; }
    #log {
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      background-color: #030712;
      border: 1px solid #1f2937;
      padding: 16px;
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Link Saver Maintenance Panel</h1>
  <p>Trigger 1-byte download simulation requests across Gofile, Pixeldrain, and Krakenfiles to reset their 30-day inactivity deletion countdowns.</p>

  <div class="card">
    <label for="service">Select Target Host</label>
    <select id="service" onchange="updatePlaceholder()">
      <option value="pixeldrain">Pixeldrain</option>
      <option value="gofile">Gofile</option>
      <option value="krakenfiles">Krakenfiles</option>
    </select>

    <label for="url" id="urlLabel">File Link or ID</label>
    <input type="text" id="url" placeholder="https://pixeldrain.com/u/abc123de" required>

    <label for="token">Optional Bearer Token (If API access is locked)</label>
    <input type="password" id="token" placeholder="Optional API Token">

    <button onclick="executeKeepAlive()">Execute Keep-Alive Task</button>
  </div>

  <pre id="log"></pre>

  <script>
    function updatePlaceholder() {
      const service = document.getElementById('service').value;
      const urlInput = document.getElementById('url');
      const label = document.getElementById('urlLabel');

      if (service === 'pixeldrain') {
        urlInput.placeholder = 'https://pixeldrain.com/u/abc123de';
        label.textContent = 'Pixeldrain File Link or ID';
      } else if (service === 'gofile') {
        urlInput.placeholder = 'https://gofile.io/d/abc123de';
        label.textContent = 'Gofile Folder Link or ID';
      } else if (service === 'krakenfiles') {
        urlInput.placeholder = 'https://krakenfiles.com/view/abc123de/file.html';
        label.textContent = 'Krakenfiles Viewer Link or ID';
      }
    }

    async function executeKeepAlive() {
      const url = document.getElementById('url').value.trim();
      const service = document.getElementById('service').value;
      const apiToken = document.getElementById('token').value.trim();
      const logBox = document.getElementById('log');

      if (!url) {
        alert('Please enter a valid link or ID.');
        return;
      }

      logBox.style.display = 'block';
      logBox.textContent = `Pinging ${service} server... Please wait...`;

      const headers = { 'Content-Type': 'application/json' };
      if (apiToken) {
        headers['Authorization'] = `Bearer ${apiToken}`;
      }

      try {
        const response = await fetch(`/api/keep-alive/${service}`, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (response.ok) {
          logBox.textContent = 'Response:\n' + JSON.stringify(data, null, 2);
        } else {
          logBox.textContent = `Error (${response.status}):\n` + JSON.stringify(data, null, 2);
        }
      } catch (err) {
        logBox.textContent = 'Network or API error: ' + err.message;
      }
    }
  </script>
</body>
</html>
